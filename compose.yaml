########################### NETWORKS
# You may customize the network subnets (192.168.x.0/24) below as you please.
networks:
  default:
    driver: bridge
  socket_proxy:
    name: socket_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  external:
    name: "external"
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    enable_ipv4: true
    enable_ipv6: true
  internal: # No internet access
    name: "internal"
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.19.0.0/16
    enable_ipv4: true
    enable_ipv6: false

