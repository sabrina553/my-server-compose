services: 
  audiobookshelf:
    container_name: audiobookshelf
    image: ${AUDIOBOOKSHELF__IMAGE}:${AUDIOBOOKSHELF__VERSION}
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    environment:
      TZ: "${TZ}"
      PUID: "${PUID}"
      PGID: "${PGID}"
      UMASK: "000"
    networks:
      - external   
      - internal 
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.${DOMAINNAME}`)"
      - "traefik.http.routers.audiobookshelf.middlewares=authelia@docker"  
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
      - "deunhealth.restart.on.unhealthy=true"
    volumes:
      - ${DATADIR}/torrents:/audiobooks
      - ${VOLDIR}/abs/config:/config
      - ${VOLDIR}/abs/meta:/metadata