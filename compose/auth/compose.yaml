services:
  authentik:
    container_name: authentik-server
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.0}
    command: server
    restart: unless-stopped
    secrets:
      - authentik_secret_key
    env_file:
      - .env
    environment:
      AUTHENTIK_SECRET_KEY: /run/secrets/authentik_secret_key
    
    networks:
      - internal
      - external

    volumes:
      - ${VOLDIR}/auth/data:/data
      - ${VOLDIR}/auth/templates:/templates

    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.authentik.rule=Host(`auth.$DOMAINNAME`)"      
      - "traefik.http.services.authentik.loadbalancer.server.port=9000" 

  authentik-worker:
    container_name: authentik-worker
    networks:
      - internal
      - socket_proxy
    command: worker
    env_file:
      - .env
    environment:
      DOCKER_HOST: "tcp://socket-proxy:2375"
      AUTHENTIK_SECRET_KEY: /run/secrets/authentik_secret_key
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.0}
    restart: unless-stopped
    user: root
    volumes:
      - ${VOLDIR}/auth/data:/data
      - ${VOLDIR}/auth/certs:/certs
      - ${VOLDIR}/auth/templates:/templates