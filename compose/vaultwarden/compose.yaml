services:
  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
        restart: false
      postgres:
        condition: service_healthy
        restart: false
    logging:
      options:
        max-size: 10m
    env_file: 
      - .env
    secrets:
      - vaultwarden_pg_url
      - smtp_password
    networks:
      - external
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=external"
      - "traefik.http.middlewares.redirect-https.redirectScheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectScheme.permanent=true"
      - "traefik.http.routers.vaultwarden-https.rule=Host(`vw.$DOMAINNAME`)"
      - "traefik.http.routers.vaultwarden-https.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-https.tls=true"
      - "traefik.http.routers.vaultwarden-https.service=vaultwarden"
      - "traefik.http.routers.vaultwarden-http.rule=Host(`vw.$DOMAINNAME`)"
      - "traefik.http.routers.vaultwarden-http.entrypoints=web"
      - "traefik.http.routers.vaultwarden-http.middlewares=redirect-https"
      - "traefik.http.routers.vaultwarden-http.service=vaultwarden"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
    volumes:
      - ${VOLDIR}/vaultwarden/:/data/    
