services:
  freshrss:
    container_name: freshrss
    image: freshrss/freshrss:latest
    #hostname: freshrss
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_started
        restart: false
      postgres:
        condition: service_started
        restart: false
    logging:
      options:
        max-size: 10m
    env_file:
      - .env
    secrets:
      - freshrss_oidc_clientid
      - freshrss_oidc_secret
      - freshrss_pg_password
      - smtp_password
    networks:
     - external
     - internal
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.freshrss.rule=Host(`rss.$DOMAINNAME`)"      
      - "traefik.http.services.freshrss.loadbalancer.server.port=80"
    volumes:
      - ${VOLDIR}/fresh-rss/data:/var/www/FreshRSS/data
      - ${VOLDIR}/fresh-rss/extensions:/var/www/FreshRSS/extensions
    
    healthcheck:
      test: ["CMD", "cli/health.php"]
      timeout: 10s
      start_period: 60s
      start_interval: 11s
      interval: 75s
      retries: 3
