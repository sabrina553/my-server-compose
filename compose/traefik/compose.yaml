services:  
  traefik:
    container_name: traefik
    image: traefik:3.6.10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      socket-proxy:
        condition: service_healthy
        restart: false
    secrets:
      - cf_dns_api_token
    environment:
      - TZ=$TZ
      - CF_DNS_API_TOKEN_FILE=/run/secrets/cf_dns_api_token
    networks:
      - external
      - internal
      - socket_proxy
    ports:
      - 80:80
      - 443:443
    command:
      #API + Dash
      - "--api.insecure=true"
      - "--api.dashboard=true"   

      # Attach the static configuration tls.yaml file that contains the tls configuration settings 
      #- "--providers.file.filename=/dynamic/tls.yaml"
      #- "--providers.file.watch=true"
      
      - "--serversTransport.insecureSkipVerify=true"
      # EntryPoints
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"  

      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--entryPoints.websecure.http3=true"
      #providers
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      #???? - "--providers.docker.network=proxy"      
   
      #certs 
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.propagation.delayBeforeChecks=10"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=8.8.8.8:53"      
      - "--certificatesresolvers.letsencrypt.acme.email=hosting@${DOMAINNAME}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"

      - "--entryPoints.websecure.http.tls.domains[0].main=${DOMAINNAME}"
      - "--entryPoints.websecure.http.tls.domains[0].sans=*.${DOMAINNAME}"

            
      # Observability 
      - "--log.level=INFO"
      - "--ping=true"
      #- "--accesslog=true"
      #- "--metrics.prometheus=true"
            
    # Traefik Dynamic configuration via Docker labels
    labels:
      # Enable self‑routing
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`traefik.int.${DOMAINNAME}`)
      - traefik.http.routers.api.service=api@internal
      - traefik.http.services.api.loadbalancer.server.port=8080

      #  Basic‑auth middleware
      - traefik.http.middlewares.api-auth.basicauth.users=sabrina:$$apr1$$kHonGrZB$$pssgJmXUjdGEJznac883K0 
      - traefik.http.routers.api.middlewares=api-auth@docker

    volumes:
      - ./config:/etc/traefik

    healthcheck:
      test: wget --quiet --tries=1 --spider http://127.0.0.1:8080/ping || exit 1
      interval: 5s
      timeout: 1s
      retries: 3
      start_period: 10s


