services:  
  traefik:
    container_name: traefik
    image: ${TRAEFIK__IMAGE}:${TRAEFIK__VERSION}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      socket-proxy:
        condition: service_healthy
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    secrets:
      - cf_dns_api_token
    environment:
      - TZ=${TZ}
      - CF_DNS_API_TOKEN_FILE=${TRAEFIK__CF_DNS_API_TOKEN_FILE}
    ports:
      - 80:80
      - 443:443    
    networks:
      - external
      - internal
      - socket_proxy
    command:
      #API + Dash
      - "--api.insecure=true"
      - "--api.dashboard=true"       
      #Observability 
      - "--log.level=INFO"
      - "--ping=true"    
      - "--serversTransport.insecureSkipVerify=true"
      #EntryPoints :80
      - "--entryPoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"  
      #EntryPoints :443
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--entryPoints.websecure.http3=true"
      #EntryPoints :domain
      - "--entryPoints.websecure.http.tls.domains[0].main=${DOMAINNAME}"
      - "--entryPoints.websecure.http.tls.domains[0].sans=*.${DOMAINNAME}"      
      # - "--entryPoints.web.forwardedHeaders.insecure=false"
      # - "--entryPoints.web.proxyProtocol.insecure=false"
      # - "--entryPoints.websecure.forwardedHeaders.insecure=false"
      # - "--entryPoints.websecure.proxyProtocol.insecure=false"
      ## Please see the Forwarded Header Trust section of the Authelia Traefik Integration documentation.
      #- "--entryPoints.web.forwardedHeaders.trustedIPs=172.19.0.0/16,172.20.0.0/16"
      #- "--entryPoints.web.proxyProtocol.trustedIPs=172.19.0.0/16,172.20.0.0/16"
      #- "--entryPoints.websecure.forwardedHeaders.trustedIPs=172.19.0.0/16,172.20.0.0/16"
      #- "--entryPoints.websecure.proxyProtocol.trustedIPs=172.19.0.0/16,172.20.0.0/16"
      #providers
      - "--providers.docker=true"
      - "--providers.docker.endpoint=${DOCKER_HOST}"
      - "--providers.docker.exposedbydefault=false"   
      #certs 
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.propagation.delayBeforeChecks=10"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=8.8.8.8:53"      
      - "--certificatesresolvers.letsencrypt.acme.email=hosting@${DOMAINNAME}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"            
    labels:
      # Enable self‑routing
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`traefik.int.${DOMAINNAME}`)
      - traefik.http.routers.api.middlewares=authelia@docker
      - traefik.http.routers.api.service=api@internal
      - traefik.http.services.api.loadbalancer.server.port=8080      
      - "deunhealth.restart.on.unhealthy=true"
    volumes:
      - ${VOLDIR}/traefik:/etc/traefik
    healthcheck:
      test: wget --quiet --tries=1 --spider http://127.0.0.1:8080/ping || exit 1
      interval: 5s
      timeout: 1s
      retries: 3
      start_period: 10s