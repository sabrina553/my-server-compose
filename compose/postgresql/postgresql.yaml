services:
  postgres:
    container_name: postgres
    image: ${POSTGRES_IMAGE}:${POSTGRES_VERSION}
    restart: unless-stopped      
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    env_file:
      - .env
    secrets:
      - postgres_password
    networks:
      - internal
    labels:
      - "deunhealth.restart.on.unhealthy=true"
      - "com.centurylinklabs.watchtower.monitor-only=true"
    volumes:
      - ${VOLDIR}/postgres:/var/lib/postgresql #data? 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: postgres-web
    image: dpage/pgadmin4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
        restart: false
      traefik:
        condition: service_started
        restart: false
    logging:
      options:
        max-size: 10m
    user: '0:0' ###ermmmm
    env_file:
      - .env
    networks:
      - internal
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.pgadmin.rule=Host(`pg.int.$DOMAINNAME`)"      
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "deunhealth.restart.on.unhealthy=true"
    volumes:
      - .pgadmin:/var/lib/pgadmin