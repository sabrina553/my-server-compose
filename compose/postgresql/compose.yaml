services:
  postgres:
    container_name: postgres
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    networks:
      - internal
    volumes:
      - ${VOLDIR}/postgres:/var/lib/postgresql #data? 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: postgres-web
    image: dpage/pgadmin4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
        restart: false
    user: '0:0' ###ermmmm
    env_file:
      - .env
    networks:
      - internal
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.pgadmin.rule=Host(`pg.int.$DOMAINNAME`)"      
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    volumes:
      - .pgadmin:/var/lib/pgadmin