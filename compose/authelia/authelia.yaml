services:
    authelia:
        container_name: "authelia"
        image: ${AUTHELIA__IMAGE}:${AUTHELIA__VERSION}
        restart: "unless-stopped"
        depends_on:
          postgres:
            condition: service_started
            restart: false
          lldap:
            condition: service_started
            restart: false
        logging:
          driver: "json-file"
          options:
            max-size: "1m"
            max-file: "3"
        secrets:
          - authelia_jwt
          - authelia_secret_key
          - authelia_pg_password
          - authelia_encryption
          - authelia_hmac_secret
          - authelia_jwks
          - lldap_user_pass
          - smtp_password
        environment:
          #- AUTHELIA_LOG_LEVEL=debug
          - TZ=${TZ}
          - PUID=${PUID}
          - PGID=${PGID}

          - AUTHELIA_SESSION_SECRET_FILE=${AUTHELIA__SESSION_SECRET}
          
          - AUTHELIA_STORAGE_POSTGRES_ADDRESS=${POSTGRESQL__HOST}
          - AUTHELIA_STORAGE_POSTGRES_DATABASE=${AUTHELIA__DB_NAME}         
          - AUTHELIA_STORAGE_POSTGRES_USERNAME=${AUTHELIA__DB_USERNAME}
          - AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE=${AUTHELIA__STORAGE_PASSWORD}
          - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=${AUTHELIA__STORAGE_ENCRYPTION_KEY}  

          - AUTHELIA_NOTIFIER_SMTP_ADDRESS=${AUTHELIA__NOTIFIER_SMTP_ADDRESS}
          - AUTHELIA_NOTIFIER_SMTP_USERNAME=${SMTP__USERNAME}
          - AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE=${SMTP__PASSWORD}
          - AUTHELIA_NOTIFIER_SMTP_SENDER=${AUTHELIA__NOTIFIER_SMTP_SENDER}
          - AUTHELIA_NOTIFIER_SMTP_SUBJECT=${AUTHELIA__NOTIFIER_SMTP_SUBJECT}                

          - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_ADDRESS=${LLDAP__LDAP_URL}
          - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_BASE_DN=${LLDAP__LDAP_BASE_DN}
          - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE=${LLDAP__LDAP_USER_PASS}
          - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_IMPLEMENTATION=${AUTHELIA__AUTHENTICATION_BACKEND_LDAP_IMPLEMENTATION}
          - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_USER=${AUTHELIA__AUTHENTICATION_BACKEND_LDAP_USER}   

          - AUTHELIA_ACCESS_CONTROL_DEFAULT_POLICY=${AUTHELIA__ACCESS_CONTROL_DEFAULT_POLICY}
          
          - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=${AUTHELIA__JWT_SECRET}
          - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE=${AUTHELIA__IDENTITY_HMAC_SECRET}

          - AUTHELIA_THEME=auto


        networks:
          - internal
          - external
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.authelia.rule=Host(`authelia.${DOMAINNAME}`)"
          - "traefik.http.routers.authelia.entrypoints=websecure"
          - "traefik.http.services.authelia.loadbalancer.server.port=9091" 
          - "traefik.http.routers.authelia.tls=true"
          - "traefik.http.middlewares.authelia.forwardAuth.address=http://authelia:9091/api/authz/forward-auth"
          - "traefik.http.middlewares.authelia.forwardAuth.trustForwardHeader=true"
          - "traefik.http.middlewares.authelia.forwardAuth.maxResponseBodySize=8192"
          - "traefik.http.middlewares.authelia.forwardAuth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Email,Remote-Name"

      ## The following commented line is for configuring the Authelia URL in the proxy. We strongly suggest this is
      ## configured in the Session Cookies section of the Authelia configuration.
      # traefik.http.middlewares.authelia.forwardAuth.address: 'http://authelia:9091/api/authz/forward-auth?authelia_url=https%3A%2F%2Fauthelia.lilyvitta.com%2F'

        volumes:
            - ".:/config"

