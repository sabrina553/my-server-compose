services:
  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      - WEBUI_PORT=8080
      - TORRENTING_PORT=52525
    # ports:
    #   - 11030:8080
    #   - 52525:52525
    #   - 52525:52525/udp
    networks:
      - internal
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.qbittorrent.rule=Host(`q.int.$DOMAINNAME`)"      
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"  
    volumes:
      - $VOLDIR/qbittorrent:/config
      - $DATADIR/torrents/downloads:/downloads