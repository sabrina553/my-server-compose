# Can be enhanced with an additional compose file
# See also https://docs.docker.com/compose/production/#modify-your-compose-file-for-production

services:
  radicale:
    container_name: radicale
    image: ${RADICALE__IMAGE}:${RADICALE__VERSION}
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    networks:
      - internal
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.radicale.rule=Host(`radi.int.$DOMAINNAME`)"      
      - "traefik.http.services.radicale.loadbalancer.server.port=5232"      
      - "deunhealth.restart.on.unhealthy=true"
    volumes:
      - ${VOLDIR}/radicale:/data
      - ${VOLDIR}/radicale:/config
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3