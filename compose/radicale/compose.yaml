# Can be enhanced with an additional compose file
# See also https://docs.docker.com/compose/production/#modify-your-compose-file-for-production

services:
  radicale:
    image: tomsquest/docker-radicale
    container_name: radicale
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 50
    restart: unless-stopped
    volumes:
      - ${VOLDIR}/radicale:/data
      - ${VOLDIR}/:/config
    networks:
      - internal
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.radicale.rule=Host(`radi.int.$DOMAINNAME`)"      
      - "traefik.http.services.radicale.loadbalancer.server.port=5232"
    healthcheck:
      test: curl -f http://127.0.0.1:5232 || exit 1
      interval: 30s
      retries: 3


networks:
  internal:
    external: true
