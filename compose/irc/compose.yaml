services:
  irc:
    image: ghcr.io/thelounge/thelounge:latest
    container_name: thelounge
    #ports:
    #  - "9000:9000"
    restart: always
    env_file: .env
    networks: 
      - internal
    volumes:
      - ${VOLUME_DIRECTORY}:/var/opt/thelounge # uses a named volume
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.irc.rule=Host(`irc.int.$DOMAIN`)"      
      - "traefik.http.services.irc.loadbalancer.server.port=9000"      
volumes:
  thelounge:
networks:
  internal:
    external: true
