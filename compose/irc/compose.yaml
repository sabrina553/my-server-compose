services:
  irc:
    image: ghcr.io/thelounge/thelounge:latest
    container_name: thelounge
    restart: always
    networks: 
      - internal
    volumes:
      - ${VOLDIR}/irc/:/var/opt/thelounge # uses a named volume
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.irc.rule=Host(`irc.int.$DOMAINNAME`)"      
      - "traefik.http.services.irc.loadbalancer.server.port=9000"      
volumes:
  thelounge:
networks:
  internal:
    external: true
