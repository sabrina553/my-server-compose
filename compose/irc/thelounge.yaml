services:
  irc:
    container_name: thelounge
    image: ${IRC__IMAGE}:${IRC__VERSION}
    restart: always
    depends_on:
      traefik:
        condition: service_started
        restart: false
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
    networks: 
      - external
    labels:
      - "traefik.enable=true"       
      - "traefik.http.routers.irc.rule=Host(`irc.int.$DOMAINNAME`)"      
      - "traefik.http.services.irc.loadbalancer.server.port=9000" 
      - "deunhealth.restart.on.unhealthy=true" 
    volumes:
      - ${VOLDIR}/irc/:/var/opt/thelounge